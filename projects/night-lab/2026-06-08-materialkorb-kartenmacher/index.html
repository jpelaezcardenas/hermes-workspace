<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Materialkorb-Kartenmacher</title>
  <style>
    :root{--bg:#f6f3ea;--card:#fffdf8;--ink:#24313f;--muted:#66727f;--accent:#2f6f6d;--line:#d8d2c7;--shadow:0 12px 30px rgba(36,49,63,.10)}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:linear-gradient(180deg,#fbfaf6, #f2eee4);color:var(--ink)}
    .wrap{max-width:1040px;margin:0 auto;padding:24px} header{display:flex;justify-content:space-between;gap:16px;align-items:end;margin-bottom:18px}
    h1{margin:0;font-size:clamp(28px,4vw,42px)} .tag{display:inline-block;padding:6px 10px;border-radius:999px;background:#e6f1ef;color:var(--accent);font-weight:700;font-size:13px}
    .grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px} .panel,.preview{background:rgba(255,253,248,.82);backdrop-filter:blur(4px);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow)}
    .panel{padding:18px} .preview{padding:18px}
    label{display:block;font-size:13px;font-weight:700;margin:12px 0 6px} input,textarea,select,button{font:inherit} input,textarea,select{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 14px;background:#fff;color:var(--ink)} textarea{min-height:92px;resize:vertical}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px} .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
    button{border:0;border-radius:14px;padding:12px 14px;font-weight:800;cursor:pointer} .primary{background:var(--accent);color:white} .secondary{background:#e9ece8;color:var(--ink)}
    .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}.card{background:linear-gradient(180deg,#fff, #fbf8f0);border:1px solid var(--line);border-radius:18px;padding:14px;min-height:210px;display:flex;flex-direction:column;gap:10px}.card .num{font-size:12px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.08em}.card h3{margin:0;font-size:20px}.card p{margin:0;color:var(--muted);line-height:1.35}.pill{display:inline-block;margin-top:auto;background:#edf5f3;color:var(--accent);padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700;align-self:flex-start}
    .output{margin-top:14px;border-top:1px dashed var(--line);padding-top:14px}.summary{white-space:pre-wrap;background:#fbfaf7;border:1px solid var(--line);border-radius:16px;padding:14px;line-height:1.4}
    .hint{color:var(--muted);font-size:14px;line-height:1.45}.small{font-size:12px;color:var(--muted)}
    @media (max-width: 860px){.grid,.row,.cards{grid-template-columns:1fr}} @media print{body{background:white}.panel,.preview{box-shadow:none}.actions,.tag,.small{display:none}.grid{display:block}.preview{margin-top:16px}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <span class="tag">Materialkorb-Kartenmacher</span>
        <h1>Eine Idee in drei druckbare Karten verdichten</h1>
        <p class="hint">Für GE, Lernwerkstatt und schnelle Vorbereitung: aus einem Thema werden 3 klare Karten mit Material, Start und Beobachtung.</p>
      </div>
      <div class="small">Lokal · ohne Konto · ohne API</div>
    </header>

    <div class="grid">
      <section class="panel">
        <div class="row">
          <div>
            <label for="topic">Thema</label>
            <input id="topic" value="S-Kiste: Laut S und erste Sortierung" />
          </div>
          <div>
            <label for="audience">Zielgruppe</label>
            <select id="audience">
              <option>GE-Gruppe</option>
              <option>fachfremde Kolleg:innen</option>
              <option>kleine Lerngruppe</option>
            </select>
          </div>
        </div>

        <label for="materials">Materialstichworte</label>
        <textarea id="materials">3 Gegenstände oder Bildkarten, Lautgebärde, 2 Sortierfelder, Ablagefeld, Stift</textarea>

        <div class="row">
          <div>
            <label for="goal">Ziel in einem Satz</label>
            <input id="goal" value="Beteiligung sichtbar machen, ohne Materialflut." />
          </div>
          <div>
            <label for="mode">Modus</label>
            <select id="mode">
              <option>basal</option>
              <option selected>konkret-handelnd</option>
              <option>symbolisch</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button class="primary" id="buildBtn">Karten bauen</button>
          <button class="secondary" id="copyBtn">Text kopieren</button>
          <button class="secondary" id="printBtn">Drucken</button>
        </div>

        <div class="output">
          <div class="small">Ausgabe zum Kopieren</div>
          <div class="summary" id="summary">Klicke auf „Karten bauen“.</div>
        </div>
      </section>

      <aside class="preview">
        <div class="small">Vorschau</div>
        <div class="cards" id="cards"></div>
      </aside>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const cardsEl = $('cards');
    const summaryEl = $('summary');

    function build(){
      const topic = $('topic').value.trim() || 'Thema';
      const audience = $('audience').value;
      const materials = $('materials').value.trim();
      const goal = $('goal').value.trim();
      const mode = $('mode').value;
      const items = [
        {n:'Karte 1', t:'Material', p: materials},
        {n:'Karte 2', t:'Startsatz', p:`„Heute geht es um ${topic}. Was passt dazu?“`},
        {n:'Karte 3', t:'Beobachtung', p:`Welche Hilfe oeffnet Beteiligung im ${audience}-Setting am besten?`},
      ];
      cardsEl.innerHTML = items.map((it, idx) => `<article class="card"><div class="num">${it.n}</div><h3>${it.t}</h3><p>${it.p}</p><span class="pill">${mode}</span></article>`).join('');
      summaryEl.textContent = `THEMA: ${topic}\nZIELGRUPPE: ${audience}\nMODUS: ${mode}\n\n1) Material: ${materials}\n2) Startsatz: „Heute geht es um ${topic}. Was passt dazu?“\n3) Ziel: ${goal}\n4) Beobachtung: Welche Hilfe oeffnet Beteiligung am besten?\n\nNaechster Schritt: Karten ausdrucken oder als Notiz kopieren.`;
    }
    $('buildBtn').addEventListener('click', build);
    $('copyBtn').addEventListener('click', async () => { build(); await navigator.clipboard.writeText(summaryEl.textContent); $('copyBtn').textContent='Kopiert'; setTimeout(()=>$('copyBtn').textContent='Text kopieren', 1200); });
    $('printBtn').addEventListener('click', () => window.print());
    build();
  </script>
</body>
</html>
