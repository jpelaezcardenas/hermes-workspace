<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TSV Playbook Analyse</title>
    <style>
      :root { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #17201b; background: #f5f3ee; }
      body { margin: 0; }
      main { width: min(100% - 32px, 1080px); margin: 0 auto; padding: 28px 0 48px; }
      header { margin-bottom: 20px; }
      h1 { margin: 0 0 8px; font-size: 2rem; }
      p { line-height: 1.55; }
      nav { display: flex; gap: 10px; flex-wrap: wrap; margin: 18px 0; }
      button { border: 1px solid #bcc7bd; background: #fffdf9; color: #17201b; border-radius: 8px; padding: 10px 14px; font-weight: 650; cursor: pointer; }
      button.active { background: #214d35; color: white; border-color: #214d35; }
      article { background: #fffdf9; border: 1px solid #d8d2c6; border-radius: 12px; padding: 22px; box-shadow: 0 8px 22px rgba(40, 35, 25, .08); }
      pre { white-space: pre-wrap; overflow-wrap: anywhere; font: 15px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; margin: 0; }
      .hint { color: #5c665e; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>TSV / Wahren Playbook Analyse</h1>
        <p class="hint">Hermes-Ergebnis aus dem Kanban-Task. Die Dateien liegen sichtbar im Projektordner <strong>tsv-playbook-analyse</strong>.</p>
      </header>
      <nav>
        <button id="strategy" class="active" type="button">Vereinsstrategie & Ausbau</button>
        <button id="commerce" type="button">Kommerzialisierung & Partner</button>
      </nav>
      <article><pre id="content">Lade Ergebnis...</pre></article>
    </main>
    <script>
      const files = {
        strategy: 'vereinsstrategie-ausbauanalyse-wahren-playbook.md',
        commerce: 'kommerzialisierungs-partnerschaftsanalyse-wahren-playbook.md'
      };
      async function load(name) {
        document.querySelectorAll('button').forEach((button) => button.classList.toggle('active', button.id === name));
        const response = await fetch(files[name]);
        document.getElementById('content').textContent = await response.text();
      }
      document.getElementById('strategy').addEventListener('click', () => load('strategy'));
      document.getElementById('commerce').addEventListener('click', () => load('commerce'));
      load('strategy');
    </script>
  </body>
</html>
