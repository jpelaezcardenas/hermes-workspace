<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1400" viewBox="0 0 900 1400">
  <rect width="900" height="1400" fill="#ffffff"/>
  <text x="450" y="70" text-anchor="middle" font-family="Figtree, Arial, sans-serif" font-size="32" font-weight="700" fill="#111111">Compliance transfer sequence</text>
  <g font-family="Figtree, Arial, sans-serif" font-size="20" text-anchor="middle" fill="#111111">
    <text x="110" y="140">Investor</text>
    <text x="270" y="140">DALP portal</text>
    <text x="430" y="140">Identity</text>
    <text x="590" y="140">Policy</text>
    <text x="750" y="140">Chain / custody</text>
  </g>
  <g stroke="#D0D0D0" stroke-width="3">
    <line x1="110" y1="170" x2="110" y2="1280"/>
    <line x1="270" y1="170" x2="270" y2="1280"/>
    <line x1="430" y1="170" x2="430" y2="1280"/>
    <line x1="590" y1="170" x2="590" y2="1280"/>
    <line x1="750" y1="170" x2="750" y2="1280"/>
  </g>
  <g stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M110 250 H270" stroke="#0000FF"/><text x="190" y="235" fill="#111111" font-family="Figtree, Arial, sans-serif" font-size="18">Request transfer / redemption</text>
    <path d="M270 380 H430" stroke="#187848"/><text x="350" y="365" fill="#111111" font-family="Figtree, Arial, sans-serif" font-size="18">Resolve identity</text>
    <path d="M430 510 H270" stroke="#187848"/><text x="350" y="495" fill="#111111" font-family="Figtree, Arial, sans-serif" font-size="18">Verified profile</text>
    <path d="M270 640 H590" stroke="#C05030"/><text x="430" y="625" fill="#111111" font-family="Figtree, Arial, sans-serif" font-size="18">Check jurisdiction, whitelist, limits</text>
    <path d="M590 770 H270" stroke="#C05030"/><text x="430" y="755" fill="#111111" font-family="Figtree, Arial, sans-serif" font-size="18">Approved / rejected</text>
    <path d="M270 900 H750" stroke="#8848C8"/><text x="510" y="885" fill="#111111" font-family="Figtree, Arial, sans-serif" font-size="18">Execute transfer or burn</text>
    <path d="M750 1030 H270" stroke="#1E4868"/><text x="510" y="1015" fill="#111111" font-family="Figtree, Arial, sans-serif" font-size="18">Settlement event + status</text>
    <path d="M270 1160 H110" stroke="#0000FF"/><text x="190" y="1145" fill="#111111" font-family="Figtree, Arial, sans-serif" font-size="18">Completion / failure explanation</text>
  </g>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#787878"/></marker></defs>
</svg>