<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Agent - Login</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg-primary:#0a0e1a;--bg-card:#1a2235;--bg-input:#0d1321;
    --border:#2a3550;--border-focus:#6366f1;
    --text-primary:#e2e8f0;--text-secondary:#94a3b8;--text-muted:#64748b;
    --accent:#6366f1;--accent-hover:#818cf8;--accent-glow:rgba(99,102,241,0.15);
    --error:#ef4444;--error-bg:rgba(239,68,68,0.1);
    --success:#22c55e;--success-bg:rgba(34,197,94,0.1);
    --gradient:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#a78bfa 100%);
    --shadow-lg:0 25px 50px -12px rgba(0,0,0,0.5);
    --shadow-glow:0 0 40px rgba(99,102,241,0.15);
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--bg-primary);color:var(--text-primary);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    overflow:hidden;position:relative;
  }
  .bg-grid{
    position:fixed;inset:0;
    background-image:linear-gradient(rgba(99,102,241,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,0.03) 1px,transparent 1px);
    background-size:60px 60px;animation:gridMove 20s linear infinite;
  }
  @keyframes gridMove{0%{transform:translate(0,0)}100%{transform:translate(60px,60px)}}
  .bg-orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:0.4;animation:orbFloat 8s ease-in-out infinite}
  .bg-orb-1{width:400px;height:400px;background:radial-gradient(circle,rgba(99,102,241,0.3),transparent 70%);top:-100px;left:-100px}
  .bg-orb-2{width:300px;height:300px;background:radial-gradient(circle,rgba(139,92,246,0.2),transparent 70%);bottom:-50px;right:-50px;animation-delay:-4s}
  .bg-orb-3{width:200px;height:200px;background:radial-gradient(circle,rgba(14,165,233,0.15),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-2s}
  @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,15px) scale(0.95)}}
  .login-container{position:relative;z-index:10;width:100%;max-width:440px;padding:0 24px}
  .login-card{
    background:var(--bg-card);border:1px solid var(--border);border-radius:20px;
    padding:48px 40px;box-shadow:var(--shadow-lg),var(--shadow-glow);
    backdrop-filter:blur(20px);animation:cardIn 0.6s ease-out;
  }
  @keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
  .logo-section{text-align:center;margin-bottom:36px}
  .logo-icon{
    width:64px;height:64px;margin:0 auto 16px;background:var(--gradient);
    border-radius:18px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 24px rgba(99,102,241,0.3);animation:logoPulse 3s ease-in-out infinite;
  }
  @keyframes logoPulse{0%,100%{box-shadow:0 8px 24px rgba(99,102,241,0.3)}50%{box-shadow:0 8px 32px rgba(99,102,241,0.5)}}
  .logo-icon svg{width:32px;height:32px;fill:white}
  .logo-title{font-size:24px;font-weight:700;letter-spacing:-0.5px;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .logo-subtitle{font-size:13px;color:var(--text-muted);margin-top:4px;font-weight:400;letter-spacing:0.5px;text-transform:uppercase}
  .message{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:20px;display:none;align-items:center;gap:10px;animation:msgIn 0.3s ease-out}
  @keyframes msgIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  .message-error{background:var(--error-bg);border:1px solid rgba(239,68,68,0.2);color:var(--error)}
  .message-success{background:var(--success-bg);border:1px solid rgba(34,197,94,0.2);color:var(--success)}
  .message svg{width:18px;height:18px;flex-shrink:0}
  /* Google button */
  .btn-google{
    width:100%;padding:13px 16px;background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;
    color:#1a1a2e;font-size:15px;font-weight:500;font-family:inherit;
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
    transition:all 0.2s ease;margin-bottom:4px;
  }
  .btn-google:hover{background:#f8fafc;border-color:#c8d0dc;box-shadow:0 2px 8px rgba(0,0,0,0.12);transform:translateY(-1px)}
  .btn-google:active{transform:translateY(0)}
  .btn-google:disabled{opacity:0.6;cursor:not-allowed;transform:none}
  .google-logo{width:20px;height:20px;flex-shrink:0}
  .divider{display:flex;align-items:center;gap:16px;margin:20px 0;color:var(--text-muted);font-size:12px}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
  .form-group{margin-bottom:20px}
  .form-label{display:block;font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:8px;letter-spacing:0.3px}
  .input-wrapper{position:relative}
  .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);width:18px;height:18px;transition:color 0.2s}
  .form-input{
    width:100%;padding:12px 44px 12px 44px;background:var(--bg-input);
    border:1.5px solid var(--border);border-radius:12px;color:var(--text-primary);
    font-size:15px;font-family:inherit;outline:none;transition:all 0.25s ease;
  }
  .form-input::placeholder{color:var(--text-muted)}
  .form-input:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--accent-glow)}
  .password-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;display:flex;transition:color 0.2s}
  .password-toggle:hover{color:var(--text-secondary)}
  .password-toggle svg{width:18px;height:18px}
  .form-options{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
  .remember-me{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text-secondary)}
  .remember-me input[type="checkbox"]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
  .btn-login{
    width:100%;padding:14px;background:var(--gradient);border:none;border-radius:12px;
    color:white;font-size:15px;font-weight:600;font-family:inherit;
    cursor:pointer;transition:all 0.25s ease;position:relative;overflow:hidden;letter-spacing:0.3px;
  }
  .btn-login::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.1),transparent);opacity:0;transition:opacity 0.25s}
  .btn-login:hover::before{opacity:1}
  .btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(99,102,241,0.4)}
  .btn-login:active{transform:translateY(0)}
  .btn-login:disabled{opacity:0.6;cursor:not-allowed;transform:none}
  .spinner{display:none;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  .status-bar{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
  .status-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted)}
  .status-dot{width:6px;height:6px;border-radius:50%;animation:statusPulse 2s ease-in-out infinite}
  .status-dot.online{background:var(--success)}
  .status-dot.offline{background:var(--error)}
  @keyframes statusPulse{0%,100%{opacity:1}50%{opacity:0.5}}
  .login-footer{text-align:center;margin-top:28px;font-size:12px;color:var(--text-muted)}
  @keyframes shake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-4px)}20%,40%,60%,80%{transform:translateX(4px)}}
  .shake{animation:shake 0.5s ease-in-out}
  @media(max-width:480px){.login-card{padding:36px 24px}.logo-title{font-size:20px}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>

<div class="login-container">
  <div class="login-card" id="loginCard">
    <div class="logo-section">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div class="logo-title">Hermes Agent</div>
      <div class="logo-subtitle">AI Orchestration Platform</div>
    </div>

    <div class="message message-error" id="errorMsg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      <span id="errorText">Invalid password. Please try again.</span>
    </div>

    <div class="message message-success" id="successMsg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <span>Authentication successful. Redirecting...</span>
    </div>

    <!-- Google Sign-In -->
    <button class="btn-google" id="googleBtn" onclick="window.location.href='/auth/google'">
      <svg class="google-logo" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.4 30.2 0 24 0 14.7 0 6.7 5.4 2.9 13.3l7.8 6C12.5 13 17.8 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/>
        <path fill="#FBBC05" d="M10.7 28.7A14.4 14.4 0 0 1 9.5 24c0-1.6.3-3.2.7-4.7l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.9 10.7l7.8-6z"/>
        <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.2 0-11.5-4.2-13.3-9.9l-7.8 6C6.7 42.6 14.7 48 24 48z"/>
      </svg>
      Sign in with Google
    </button>

    <div class="divider">or sign in with password</div>

    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="password">Access Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" class="form-input" placeholder="Enter your password" required autofocus>
          <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eyeOffIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <div class="form-options">
        <label class="remember-me"><input type="checkbox" id="rememberMe"> Remember this device</label>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <span id="btnText">Sign In</span>
        <div class="spinner" id="btnSpinner"></div>
      </button>
    </form>

    <div class="divider">System Status</div>

    <div class="status-bar">
      <div class="status-item"><span class="status-dot online" id="gatewayStatus"></span><span>Gateway</span></div>
      <div class="status-item"><span class="status-dot online" id="dashboardStatus"></span><span>Dashboard</span></div>
      <div class="status-item"><span class="status-dot online" id="hindsightStatus"></span><span>Memory</span></div>
    </div>

    <div class="login-footer">
      <span>Secured by Hermes Agent</span>
      <span style="margin:0 6px">&middot;</span>
      <span>v0.16.0</span>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';
  var form=document.getElementById('loginForm');
  var pw=document.getElementById('password');
  var btn=document.getElementById('loginBtn');
  var btnTxt=document.getElementById('btnText');
  var spin=document.getElementById('btnSpinner');
  var errBox=document.getElementById('errorMsg');
  var errTxt=document.getElementById('errorText');
  var okBox=document.getElementById('successMsg');
  var card=document.getElementById('loginCard');
  var toggle=document.getElementById('togglePassword');
  var eye=document.getElementById('eyeIcon');
  var eyeOff=document.getElementById('eyeOffIcon');
  var gBtn=document.getElementById('googleBtn');

  var ERROR_MESSAGES={
    unauthorized_email:'Access denied. This Google account is not authorised.',
    oauth_failed:'Google authentication failed. Please try again.',
    oauth_state:'Authentication session expired. Please try again.',
    oauth_invalid:'Invalid OAuth response. Please try again.',
    oauth_disabled:'Google login is not configured on this server.'
  };

  // Show error from URL ?error= param
  var urlParams=new URLSearchParams(window.location.search);
  var urlError=urlParams.get('error');
  if(urlError){
    showErr(ERROR_MESSAGES[urlError]||'Authentication error. Please try again.');
    // clean URL without reload
    history.replaceState(null,'',window.location.pathname);
  }

  toggle.onclick=function(){
    var t=pw.type==='password'?'text':'password';
    pw.type=t;
    eye.style.display=t==='password'?'block':'none';
    eyeOff.style.display=t==='password'?'none':'block';
  };

  function showErr(m){
    errTxt.textContent=m;
    errBox.style.display='flex';
    okBox.style.display='none';
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');
    setTimeout(function(){card.classList.remove('shake')},500);
  }
  function showOk(){
    okBox.style.display='flex';
    errBox.style.display='none';
  }
  function setLoad(l){
    btn.disabled=l;
    gBtn.disabled=l;
    btnTxt.style.display=l?'none':'block';
    spin.style.display=l?'block':'none';
  }

  // Check if already logged in
  var checkReq=new XMLHttpRequest();
  checkReq.open('POST','/auth/verify',false);
  checkReq.setRequestHeader('Content-Type','application/json');
  try{
    checkReq.send();
    if(checkReq.status===200){
      var resp=JSON.parse(checkReq.responseText);
      if(resp.ok){window.location.href='/';return;}
    }
  }catch(e){}

  form.addEventListener('submit',function(e){
    e.preventDefault();
    setLoad(true);
    errBox.style.display='none';

    var data=JSON.stringify({password:pw.value});
    var xhr=new XMLHttpRequest();
    xhr.open('POST','/auth/login',true);
    xhr.setRequestHeader('Content-Type','application/json');
    xhr.onreadystatechange=function(){
      if(xhr.readyState===4){
        try{
          var r=JSON.parse(xhr.responseText);
          if(r.ok){
            showOk();
            setLoad(true);
            setTimeout(function(){window.location.href='/';},800);
          }else{
            setLoad(false);
            showErr(r.error||'Invalid password. Please try again.');
            pw.value='';
            pw.focus();
          }
        }catch(ex){
          setLoad(false);
          showErr('Connection error. Please try again.');
        }
      }
    };
    xhr.onerror=function(){
      setLoad(false);
      showErr('Connection error. Is the auth service running?');
    };
    xhr.send(data);
  });
})();
</script>
</body>
</html>
